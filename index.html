
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Popsy Flow - Sistema de Eficiencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        [x-cloak] { display: none !important; }
        html, body { overflow-x: hidden; position: relative; height: 100%; }
        .bg-popsy-gradient { background: linear-gradient(135deg, #fdf2f8 0%, #e0f2fe 100%); }
        .pulse-red { animation: pulse-bg 1.5s infinite; }
        @keyframes pulse-bg {
            0% { background-color: #ffffff; }
            50% { background-color: #fee2e2; }
            100% { background-color: #ffffff; }
        }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
            .max-w-md { max-width: 100%; box-shadow: none; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 h-full">

    <div x-data="popsyApp()" x-init="init()" class="max-w-md mx-auto min-h-screen bg-gray-50 shadow-2xl relative overflow-hidden flex flex-col">
        
        <!-- PANTALLA PRINCIPAL -->
        <div x-show="!timerActive" class="flex-1 pb-24 overflow-y-auto" x-cloak>
            
            <header class="p-4 no-print">
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <div>
                        <h1 class="text-2xl font-black text-blue-600 tracking-tight italic">POPSY <span class="text-pink-500">FLOW</span></h1>
                        <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">v4.3 - Audio Optimizado</p>
                    </div>
                    <div class="flex flex-col items-end">
                        <div class="bg-blue-600 p-2 rounded-xl text-white shadow-lg mb-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        </div>
                        <!-- Indicador de estado de audio -->
                        <span class="text-[8px] font-bold uppercase" :class="audioReady ? 'text-green-500' : 'text-amber-500'" x-text="audioReady ? 'Sonido Listo' : 'Toca para Activar'"></span>
                    </div>
                </div>
            </header>

            <main class="p-4 space-y-6">
                
                <div x-show="activeTab === 'home'" class="no-print">
                    <!-- Productos -->
                    <section class="mb-6">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2 mb-3 px-1 text-xs uppercase tracking-widest">
                            <span class="w-2 h-2 bg-pink-500 rounded-full"></span> Preparación de Productos
                        </h3>
                        <div class="grid grid-cols-1 gap-3">
                            <template x-for="prod in products" :key="prod.name">
                                <button @click="startTimer('product', prod)" class="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm active:scale-95 transition-all">
                                    <div class="flex items-center gap-3">
                                        <div :class="`w-10 h-10 ${prod.color} rounded-xl flex items-center justify-center font-bold text-lg`" x-text="prod.name[0]"></div>
                                        <div class="text-left">
                                            <p class="font-bold text-gray-800 text-sm" x-text="prod.name"></p>
                                            <p class="text-[10px] text-gray-400 font-mono" x-text="'META: ' + prod.target + 's'"></p>
                                        </div>
                                    </div>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                                </button>
                            </template>
                        </div>
                    </section>

                    <!-- Spots de Ruta -->
                    <section>
                        <h3 class="font-bold text-gray-800 flex items-center gap-2 mb-3 px-1 text-xs uppercase tracking-widest">
                            <span class="w-2 h-2 bg-blue-500 rounded-full"></span> Control de Ruta & Volumen
                        </h3>
                        <div class="grid grid-cols-1 gap-3">
                            <template x-for="(config, key) in spotConfigs" :key="key">
                                <button @click="startTimer('spot', {name: config.label, target: config.time, key: key})" class="flex items-center justify-between p-4 bg-white border border-gray-100 rounded-2xl shadow-sm active:scale-95 transition-all">
                                    <div class="flex items-center gap-4">
                                        <div class="p-2 rounded-lg bg-blue-50 text-blue-600">
                                            <template x-if="key === 'neighborhood'"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0 8c-1.65 0-3-1.35-3-3s1.35-3 3-3 3 1.35 3 3-1.35 3-3 3z"/></svg></template>
                                            <template x-if="key === 'complex'"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg></template>
                                            <template x-if="key === 'night'"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M10 2c-1.82 0-3.53.5-5 1.35C7.99 5.08 10 8.3 10 12s-2.01 6.92-5 8.65C6.47 21.5 8.18 22 10 22c5.52 0 10-4.48 10-10S15.52 2 10 2z"/></svg></template>
                                        </div>
                                        <div class="text-left">
                                            <p class="font-black text-gray-800 text-sm uppercase" x-text="config.label"></p>
                                            <p class="text-[10px] text-gray-400 font-bold uppercase" x-text="'Meta: ' + config.time + 's'"></p>
                                        </div>
                                    </div>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" /></svg>
                                </button>
                            </template>
                        </div>
                    </section>
                </div>

                <!-- ANÁLISIS -->
                <div x-show="activeTab === 'stats'">
                    <div class="space-y-6 pb-10">
                        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 flex justify-between items-center no-print">
                            <div>
                                <h2 class="text-xl font-black text-gray-800 tracking-tighter uppercase leading-none">Métricas Hoy</h2>
                                <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mt-1" x-text="'Fecha: ' + lastResetDate"></p>
                            </div>
                            <div class="flex gap-2">
                                <button @click="window.print()" class="bg-blue-600 text-white p-2 rounded-xl shadow-md active:scale-95 transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                                </button>
                                <button @click="resetHistory()" class="text-[9px] font-black bg-red-50 text-red-500 px-3 py-2 rounded-xl uppercase active:bg-red-100 transition-colors">Limpiar</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-4">
                            <template x-for="item in getAllAnalyzableItems()" :key="item.name">
                                <div x-show="getStat(item.name)" class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm space-y-4 break-inside-avoid">
                                    <div class="flex justify-between items-center border-b border-gray-50 pb-2">
                                        <h4 class="font-black text-xs uppercase text-gray-800" x-text="item.name"></h4>
                                        <span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded-full font-bold text-gray-500" x-text="'N: ' + getStat(item.name).count"></span>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="p-3 bg-gray-50 rounded-xl">
                                            <p class="text-[8px] font-bold text-gray-400 uppercase">Rapidez Media</p>
                                            <p class="text-xl font-black italic" :class="getStat(item.name).avg > item.target ? 'text-red-500' : 'text-green-600'" x-text="getStat(item.name).avg.toFixed(1) + 's'"></p>
                                        </div>
                                        <div class="p-3 bg-gray-50 rounded-xl text-right">
                                            <p class="text-[8px] font-bold text-gray-400 uppercase">Peor Tiempo</p>
                                            <p class="text-xl font-black text-gray-800 italic" x-text="getStat(item.name).max + 's'"></p>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div x-show="history.length > 0" class="mt-8">
                            <h3 class="font-black text-gray-800 text-[10px] uppercase tracking-widest mb-4 flex items-center gap-2">
                                <span class="w-4 h-[2px] bg-blue-500"></span> Bitácora (HH:MM)
                            </h3>
                            <div class="space-y-2">
                                <template x-for="(entry, index) in [...history].reverse()" :key="index">
                                    <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm flex items-center justify-between gap-3 text-xs">
                                        <div class="flex items-center gap-3">
                                            <div class="text-[10px] font-mono font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded" x-text="formatLogTime(entry.date)"></div>
                                            <div>
                                                <p class="font-bold text-gray-800" x-text="entry.name"></p>
                                            </div>
                                        </div>
                                        <div class="text-right">
                                            <p class="font-black italic" :class="entry.isExcess ? 'text-red-500' : 'text-green-600'" x-text="entry.timeSpent + 's'"></p>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </main>

            <!-- NAV -->
            <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 px-8 py-4 flex justify-around items-center z-40 shadow-[0_-4px_15px_rgba(0,0,0,0.05)] no-print">
                <button @click="activeTab = 'home'" :class="activeTab === 'home' ? 'text-blue-600 scale-110' : 'text-gray-400'" class="flex flex-col items-center gap-1 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                    <span class="text-[9px] font-black uppercase">Panel</span>
                </button>
                <button @click="activeTab = 'stats'" :class="activeTab === 'stats' ? 'text-pink-600 scale-110' : 'text-gray-400'" class="flex flex-col items-center gap-1 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                    <span class="text-[9px] font-black uppercase">Análisis</span>
                </button>
            </nav>
        </div>

        <!-- CRONÓMETRO -->
        <div x-show="timerActive" 
             x-transition.opacity.duration.300ms
             :class="isOverTime ? 'pulse-red' : 'bg-popsy-gradient'"
             class="fixed inset-0 z-50 flex flex-col p-6 max-w-md mx-auto h-full no-print" x-cloak>
            
            <div class="flex items-center justify-between mb-4">
                <button @click="cancelTimer()" class="p-3 bg-white/80 backdrop-blur rounded-full shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
                <div class="px-4 py-1 bg-white/80 backdrop-blur rounded-full text-[10px] font-black uppercase tracking-widest text-gray-500 shadow-sm" x-text="timerType === 'product' ? 'Producción' : 'Ruta'"></div>
            </div>

            <div class="flex-1 flex flex-col items-center justify-start pt-2 space-y-6">
                <div class="text-center w-full">
                    <h2 class="text-4xl font-black text-gray-800 uppercase tracking-tighter leading-none" x-text="selectedItem?.name"></h2>
                    <div class="h-16 mt-4 flex items-center justify-center">
                        <template x-if="isOverTime">
                            <div class="flex flex-col gap-2 w-full px-4">
                                <template x-if="!muted">
                                    <button @click="acknowledgeSilence()" 
                                            class="bg-red-600 text-white animate-bounce shadow-lg px-8 py-3 rounded-full font-black text-xs uppercase tracking-widest transition-all border-2 border-white">
                                        SILENCIAR ALARMA
                                    </button>
                                </template>
                                <template x-if="muted">
                                    <button @click="stopTimer(true)" 
                                            class="bg-green-600 text-white shadow-lg px-8 py-4 rounded-full font-black text-sm uppercase tracking-widest transition-all border-2 border-white scale-110">
                                        ¡ENVIAR RESULTADO!
                                    </button>
                                </template>
                            </div>
                        </template>
                        <template x-if="!isOverTime">
                            <p class="text-blue-500 font-black uppercase text-[10px] tracking-[0.2em] bg-white/50 px-3 py-1 rounded-full inline-block" x-text="'OBJETIVO: ' + selectedItem?.target + 's'"></p>
                        </template>
                    </div>
                </div>

                <div class="relative w-64 h-64 flex items-center justify-center rounded-full border-[12px] transition-all duration-300 shadow-2xl bg-white" :class="isOverTime ? 'border-red-200 scale-105' : 'border-blue-100'">
                    <div class="absolute inset-[-12px] border-[12px] rounded-full border-t-transparent animate-spin" :class="isOverTime ? 'border-red-500' : (timerType === 'product' ? 'border-pink-500' : 'border-blue-500')" style="animation-duration: 3s;"></div>
                    <div class="text-7xl font-mono font-black tabular-nums tracking-tighter" :class="isOverTime ? 'text-red-600' : 'text-gray-800'" x-text="formatTime(seconds)"></div>
                </div>

                <div x-show="isOverTime && !muted" class="w-full bg-white border-b-4 border-red-500 p-4 rounded-3xl shadow-xl space-y-2">
                    <div class="flex items-center gap-2 text-red-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
                        <h4 class="font-black uppercase tracking-tighter text-xs text-red-500 animate-pulse">TIEMPO EXCEDIDO</h4>
                    </div>
                    <div class="bg-red-50 p-2 rounded-xl border border-red-100">
                        <p class="text-[11px] font-black text-red-800 uppercase leading-tight text-center" 
                           x-text="timerType === 'spot' ? spotConfigs[selectedItem?.key]?.delayAction : 'FINALIZA LA PREPARACIÓN AHORA'"></p>
                    </div>
                </div>

                <div class="w-full mt-auto mb-4" x-show="!muted">
                    <button @click="stopTimer(true)" 
                            class="w-full py-6 rounded-2xl font-black text-2xl text-white shadow-xl active:scale-95 transition-all uppercase tracking-tighter bg-gray-900">
                        ¡Completado!
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function popsyApp() {
            return {
                activeTab: 'home',
                timerActive: false,
                timerType: null,
                selectedItem: null,
                seconds: 0,
                history: [],
                lastResetDate: '',
                interval: null,
                audioCtx: null,
                audioReady: false,
                alarmOn: false,
                muted: false,
                
                products: [
                    { name: 'Sundaes', target: 30, color: 'bg-pink-100 text-pink-600' },
                    { name: 'Milkshakes', target: 45, color: 'bg-blue-100 text-blue-600' },
                    { name: 'Banana Boats', target: 45, color: 'bg-yellow-100 text-yellow-600' }
                ],
                
                spotConfigs: {
                    neighborhood: { label: 'Vecindario', time: 30, delayAction: 'BAJAR VOLUMEN AL 50%' },
                    complex: { label: 'Complejo', time: 60, delayAction: 'BAJAR VOLUMEN AL 50%' },
                    night: { label: 'Noche', time: 60, delayAction: 'APAGAR MÚSICA Y ESPERAR' }
                },

                init() {
                    this.checkAndResetDaily();
                    const saved = localStorage.getItem('popsy_flow_v4');
                    if (saved) this.history = JSON.parse(saved);
                    this.lastResetDate = localStorage.getItem('popsy_last_reset') || new Date().toLocaleDateString();
                },

                // Inicializar Audio en el primer toque
                initAudio() {
                    if (!this.audioCtx) {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (this.audioCtx.state === 'suspended') {
                        this.audioCtx.resume();
                    }
                    this.audioReady = true;
                },

                checkAndResetDaily() {
                    const now = new Date();
                    const todayStr = now.toLocaleDateString();
                    const lastReset = localStorage.getItem('popsy_last_reset');
                    if (lastReset && lastReset !== todayStr) {
                        this.history = [];
                        localStorage.removeItem('popsy_flow_v4');
                        localStorage.setItem('popsy_last_reset', todayStr);
                        this.lastResetDate = todayStr;
                    } else if (!lastReset) {
                        localStorage.setItem('popsy_last_reset', todayStr);
                    }
                },

                getAllAnalyzableItems() {
                    const productItems = this.products.map(p => ({ name: p.name, target: p.target }));
                    const spotItems = Object.values(this.spotConfigs).map(s => ({ name: s.label, target: s.time }));
                    return [...productItems, ...spotItems];
                },

                get isOverTime() {
                    return this.selectedItem && this.seconds >= this.selectedItem.target;
                },

                formatTime(s) {
                    const mins = Math.floor(s / 60);
                    const secs = s % 60;
                    return `${mins}:${secs.toString().padStart(2, '0')}`;
                },

                formatLogTime(dateIso) {
                    const date = new Date(dateIso);
                    return date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
                },

                startTimer(type, item) {
                    this.initAudio(); // Activar audio al iniciar
                    this.timerType = type;
                    this.selectedItem = item;
                    this.seconds = 0;
                    this.timerActive = true;
                    this.alarmOn = false;
                    this.muted = false;
                    
                    this.interval = setInterval(() => {
                        this.seconds++;
                        if (this.isOverTime && !this.muted) {
                            this.playAlarma();
                        }
                    }, 1000);
                },

                acknowledgeSilence() {
                    this.muted = true;
                },

                cancelTimer() {
                    clearInterval(this.interval);
                    this.timerActive = false;
                    this.seconds = 0;
                },

                stopTimer(save = false) {
                    clearInterval(this.interval);
                    if (save && this.selectedItem) {
                        this.history.push({
                            name: this.selectedItem.name,
                            timeSpent: this.seconds,
                            target: this.selectedItem.target,
                            date: new Date().toISOString(),
                            isExcess: this.seconds > this.selectedItem.target
                        });
                        localStorage.setItem('popsy_flow_v4', JSON.stringify(this.history));
                    }
                    this.timerActive = false;
                    this.muted = false;
                    this.seconds = 0;
                },

                getStat(name) {
                    const entries = this.history.filter(h => h.name === name);
                    if (entries.length === 0) return null;
                    const sum = entries.reduce((acc, curr) => acc + curr.timeSpent, 0);
                    const max = Math.max(...entries.map(e => e.timeSpent));
                    return { avg: sum / entries.length, max: max, count: entries.length };
                },

                resetHistory() {
                    if (confirm("¿Limpiar bitácora?")) {
                        this.history = [];
                        localStorage.removeItem('popsy_flow_v4');
                    }
                },

                // ALARMA REFORZADA (Doble Oscilador)
                playAlarma() {
                    if (!this.audioReady || this.muted) return;

                    try {
                        const time = this.audioCtx.currentTime;
                        
                        // Oscilador 1: Principal (880Hz)
                        const osc1 = this.audioCtx.createOscillator();
                        const gain1 = this.audioCtx.createGain();
                        osc1.type = 'square';
                        osc1.frequency.setValueAtTime(880, time);
                        gain1.gain.setValueAtTime(0.1, time);
                        gain1.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
                        osc1.connect(gain1);
                        gain1.connect(this.audioCtx.destination);
                        
                        // Oscilador 2: Contrapunto para urgencia (440Hz)
                        const osc2 = this.audioCtx.createOscillator();
                        const gain2 = this.audioCtx.createGain();
                        osc2.type = 'sawtooth';
                        osc2.frequency.setValueAtTime(440, time);
                        gain2.gain.setValueAtTime(0.05, time);
                        gain2.gain.exponentialRampToValueAtTime(0.01, time + 0.3);
                        osc2.connect(gain2);
                        gain2.connect(this.audioCtx.destination);

                        osc1.start(time);
                        osc2.start(time);
                        osc1.stop(time + 0.3);
                        osc2.stop(time + 0.3);
                        
                    } catch (e) {
                        console.error("Audio error", e);
                        this.audioReady = false; // Re-activar en siguiente clic
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
